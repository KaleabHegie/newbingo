version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bingo
      POSTGRES_USER: bingo
      POSTGRES_PASSWORD: bingo
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bingo -d bingo"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:18000:8000"

  backend_ws:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    environment:
      RUN_MODE: daphne
    ports:
      - "127.0.0.1:18001:8001"

  worker:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    environment:
      RUN_MODE: worker

  beat:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    environment:
      RUN_MODE: beat

  bot:
    build: ./bot
    env_file:
      - .env
    depends_on:
      - backend

  miniapp:
    build: ./miniapp
    ports:
      - "127.0.0.1:18080:80"


  
volumes:
  pg_data:
  redis_data:


version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bingo
      POSTGRES_USER: bingo
      POSTGRES_PASSWORD: bingo
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bingo -d bingo"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  backend_ws:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    environment:
      RUN_MODE: daphne

  worker:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    environment:
      RUN_MODE: worker

  beat:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    environment:
      RUN_MODE: beat

  bot:
    build: ./bot
    env_file:
      - .env
    depends_on:
      - backend

  miniapp:
    build: ./miniapp

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - backend_ws
      - miniapp

volumes:
  pg_data:
  redis_data:
